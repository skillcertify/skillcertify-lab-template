instructions: |
  # Python Data Analysis with pandas

  A CSV file with sales data has been placed at `/root/sales.csv`.

  Use Python 3 and pandas to answer each question. Save your answers to files
  as described in each task.

  **Quick start:**
  ```python
  import pandas as pd
  df = pd.read_csv('/root/sales.csv')
  print(df.head())
  print(df.columns.tolist())
  ```

  Run scripts with: `python3 my_script.py`

challenges:
  - id: load-and-count
    title: "Load the Dataset"
    description: |
      Load `/root/sales.csv` into a DataFrame and save the **total row count** to
      `/root/row_count.txt`.

      ```python
      import pandas as pd
      df = pd.read_csv('/root/sales.csv')
      with open('/root/row_count.txt', 'w') as f:
          f.write(str(len(df)))
      ```
    type: script
    points: 20
    validation_script: docs/validate_load.sh

  - id: top-product
    title: "Find the Best-Selling Product"
    description: |
      Find the product with the highest total **Quantity** sold across all rows
      and save its name to `/root/top_product.txt`.

      ```python
      top = df.groupby('Product')['Quantity'].sum().idxmax()
      with open('/root/top_product.txt', 'w') as f:
          f.write(top)
      ```
    type: script
    points: 25
    validation_script: docs/validate_top_product.sh

  - id: monthly-revenue
    title: "Calculate Total Revenue per Month"
    description: |
      The `Revenue` column holds revenue per row. Compute total revenue grouped by
      `Month` and save the result as a CSV to `/root/monthly_revenue.csv`
      (columns: `Month`, `Revenue`).

      ```python
      monthly = df.groupby('Month')['Revenue'].sum().reset_index()
      monthly.to_csv('/root/monthly_revenue.csv', index=False)
      ```
    type: script
    points: 25
    validation_script: docs/validate_monthly.sh

  - id: filter-region
    title: "Filter by Region"
    description: |
      Filter rows where `Region == 'North'` and save the count of matching rows
      to `/root/north_count.txt`.
    type: script
    points: 15
    validation_script: docs/validate_filter.sh

  - id: knowledge-groupby
    title: "pandas groupby"
    description: "Which pandas method groups rows by a column value and allows aggregate functions like sum() or mean()?"
    type: single_choice
    points: 15
    options:
      - "groupby()"
      - "pivot()"
      - "merge()"
      - "stack()"
    answer: "groupby()"

