  #!/bin/bash
  cat > /root/sales.csv << 'EOF'
  Month,Product,Region,Quantity,Revenue
  Jan,Widget A,North,120,2400
  Jan,Widget B,South,85,1700
  Feb,Widget A,North,95,1900
  Feb,Widget B,East,110,2200
  Mar,Widget A,South,140,2800
  Mar,Widget C,North,60,1800
  Apr,Widget B,North,75,1500
  Apr,Widget C,East,90,2700
