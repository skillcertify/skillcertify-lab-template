version: 1
title: "Linux SysAdmin — Introduction"
slug: linux-sysadmin-intro
description: |
  Hands-on Linux system administration: user management, file permissions,
  process control, and basic networking. Runs on a real Ubuntu cloud VM.
difficulty: intermediate
mode: vdi_terminal
category: linux
skills:
  - linux
  - bash
  - sysadmin
tags:
  - linux
  - sysadmin
  - ubuntu
  - permissions
duration_minutes: 45
passing_score: 70
credits: 1

environment:
  image: skillcertify/ubuntu-vdi:22.04
  init_script: |
    # This script runs inside the candidate's VM before the lab starts
    apt-get update -qq
    apt-get install -y -qq net-tools curl wget

instructions: |
  # Linux SysAdmin — Introduction

  You have a fresh Ubuntu 22.04 server. Complete the tasks below using the terminal.

  **Environment notes:**
  - You are logged in as `root`
  - The internet is available
  - All work is in this session only — nothing is saved after it ends

  Good luck!

challenges:
  - id: create-user
    title: "Create a System User"
    description: |
      Create a user named `deploy` with:
      - A home directory at `/home/deploy`
      - The default shell set to `/bin/bash`
      - Added to the `sudo` group
    type: script
    points: 20
    validation_script: docs/validate_user.sh

  - id: file-permissions
    title: "Set File Permissions"
    description: |
      Create the file `/opt/app/config.env` and set its permissions so that:
      - The owner (`root`) has read and write access
      - The group has read-only access
      - Others have no access
    type: script
    points: 20
    validation_script: docs/validate_permissions.sh

  - id: process-management
    title: "Find and Kill a Process"
    description: |
      Start `sleep 9999` in the background (e.g. with `sleep 9999 &`),
      then find its PID using `ps` or `pgrep` and kill it with `SIGTERM`.
      When you click **Check Tasks**, no `sleep 9999` process should be running.
    type: script
    points: 20
    validation_script: docs/validate_process.sh

  - id: disk-usage
    title: "Disk Usage Report"
    description: |
      Write the output of `df -h` to the file `/root/disk_report.txt`.
    type: script
    points: 15
    validation_script: docs/validate_disk.sh

  - id: knowledge-chmod
    title: "chmod 755"
    description: "What permissions does `chmod 755` give to a file?"
    type: single_choice
    points: 10
    options:
      - "Owner: rwx, Group: r-x, Others: r-x"
      - "Owner: rw-, Group: rw-, Others: r--"
      - "Owner: rwx, Group: rwx, Others: r-x"
      - "Owner: r-x, Group: r-x, Others: r-x"
    answer: "Owner: rwx, Group: r-x, Others: r-x"

  - id: knowledge-signals
    title: "Linux Signals"
    description: "Which signals can terminate a process? Select all that apply."
    type: multiple_choice
    points: 15
    options:
      - SIGTERM
      - SIGKILL
      - SIGHUP
      - SIGSTOP
    answer:
      - SIGTERM
      - SIGKILL

scoring:
  passing_score: 70
  max_score: 100

marketplace:
  credit_price: 1
