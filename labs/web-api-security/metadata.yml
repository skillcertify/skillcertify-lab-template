docs:
  title: Web & API Security — Basics
  details:
    intro:
      content: |
        You have two live targets running in your lab environment:

        | Target | URL | Description |
        |--------|-----|-------------|
        | OWASP Juice Shop | http://juice-shop:3000 | Deliberately vulnerable Node.js web app |
        | VAmPI | http://vampi:5000 | Deliberately vulnerable REST API |

        Open a terminal or Firefox to get started.

        **Tools available:** curl, Burp Suite CE, nmap, sqlmap, httpie

        **Rules:** Only attack the provided targets — no external hosts.

    questions:
      - type: script
        title: "SQL Injection — Admin Login"
        content: |
          Bypass the Juice Shop login form using SQL injection to log in as the administrator.

          When done, save your JWT token to `/root/admin_token.txt`.

          **Hint:** The email field is vulnerable. Try classic SQLi payloads.
        answer: docs/verify/task-001.sh
        points: 25

      - type: script
        title: "API Authentication Bypass"
        content: |
          Register a user on VAmPI (`POST /users/v1/register`) then find an endpoint
          that returns another user's data without proper authorization.

          Save the leaked email to `/root/leaked_email.txt`.
        answer: docs/verify/task-002.sh
        points: 25

      - type: script
        title: "BOLA — Broken Object Level Authorization"
        content: |
          VAmPI has a BOLA vulnerability. As a regular user, access the book endpoint
          `/books/v1/<title>` for a book you did not create.

          Save the book title you accessed to `/root/bola_book.txt`.
        answer: docs/verify/task-003.sh
        points: 20

