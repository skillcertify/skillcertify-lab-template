version: 1
title: "Linux SysAdmin — Introduction"
slug: linux-sysadmin-intro
description: |
  Hands-on Linux system administration: user management, file permissions,
  process control, and basic networking. Runs on a real Ubuntu cloud VM.
difficulty: intermediate
mode: vdi_terminal
category: linux
skills:
  - linux
  - bash
  - sysadmin
tags:
  - linux
  - sysadmin
  - ubuntu
  - permissions
duration_minutes: 45
passing_score: 70

environment:
  image: ghcr.io/skillcertify/vdi-ubuntu-terminal:22.04
  init_script: |
    apt-get update -qq
    apt-get install -y -qq net-tools curl wget

instructions: |
  # Linux SysAdmin — Introduction

  You have a fresh Ubuntu 22.04 server. Complete the tasks below using the terminal.

  **Notes:**
  - You are logged in as `root`
  - Internet access is available
  - Click **Check Tasks** to grade each task

challenges:
  - id: create-user
    title: "Create a System User"
    description: |
      Create a user named `deploy` with:
      - Home directory at `/home/deploy`
      - Default shell `/bin/bash`
      - Member of the `sudo` group
    type: script
    points: 20
    validation_script: labs/linux-sysadmin-intro/validate_user.sh

  - id: file-permissions
    title: "Set File Permissions"
    description: |
      Create the file `/opt/app/config.env` and set its permissions to `640`:
      - Owner (`root`): read + write
      - Group: read only
      - Others: no access
    type: script
    points: 20
    validation_script: labs/linux-sysadmin-intro/validate_permissions.sh

  - id: process-management
    title: "Find and Kill a Process"
    description: |
      Start `sleep 9999` in the background, then kill it using `SIGTERM`.
      When you click **Check Tasks**, no `sleep 9999` process should be running.
    type: script
    points: 20
    validation_script: labs/linux-sysadmin-intro/validate_process.sh

  - id: disk-usage
    title: "Disk Usage Report"
    description: |
      Write the output of `df -h` to `/root/disk_report.txt`.
    type: script
    points: 15
    validation_script: labs/linux-sysadmin-intro/validate_disk.sh

  - id: knowledge-chmod
    title: "What does chmod 755 mean?"
    description: "What permissions does `chmod 755` give to a file?"
    type: single_choice
    points: 10
    options:
      - "Owner: rwx, Group: r-x, Others: r-x"
      - "Owner: rw-, Group: rw-, Others: r--"
      - "Owner: rwx, Group: rwx, Others: r-x"
      - "Owner: r-x, Group: r-x, Others: r-x"
    answer: "Owner: rwx, Group: r-x, Others: r-x"

  - id: knowledge-signals
    title: "Which signals terminate a process?"
    description: "Select all signals that can terminate a process."
    type: multiple_choice
    points: 15
    options:
      - SIGTERM
      - SIGKILL
      - SIGHUP
      - SIGSTOP
    answer:
      - SIGTERM
      - SIGKILL

scoring:
  passing_score: 70
  max_score: 100

marketplace:
  credit_price: 1
