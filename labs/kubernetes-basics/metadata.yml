docs:
  title: Kubernetes Basics
  details:
    intro:
      content: |
        You have a dedicated Kubernetes cluster (`kubectl` is pre-configured).

        Complete each task using the terminal. The cluster already has a running namespace
        called `lab` — use it for all your workloads.

        **Quick reference:**
        ```
        kubectl get pods -n lab
        kubectl describe pod <name> -n lab
        kubectl logs <name> -n lab
        kubectl apply -f file.yaml -n lab
        ```

    questions:
      - type: script
        title: "Create an Nginx Deployment"
        content: |
          Create a Deployment named `web` in the `lab` namespace using the `nginx:alpine` image
          with **2 replicas**.

          ```bash
          kubectl create deployment web --image=nginx:alpine --replicas=2 -n lab
          ```
        answer: docs/verify/task-001.sh
        points: 20

      - type: script
        title: "Expose the Deployment as a Service"
        content: |
          Expose the `web` deployment as a **ClusterIP** service on port 80.

          Save the ClusterIP to `/root/service_ip.txt`:
          ```bash
          kubectl get svc web -n lab -o jsonpath='{.spec.clusterIP}' > /root/service_ip.txt
          ```
        answer: docs/verify/task-002.sh
        points: 20

      - type: script
        title: "Scale the Deployment"
        content: |
          Scale the `web` deployment to **4 replicas** and save the ready replica count
          to `/root/replicas.txt`.
        answer: docs/verify/task-003.sh
        points: 20

      - type: script
        title: "Create and Use a ConfigMap"
        content: |
          Create a ConfigMap named `app-config` in the `lab` namespace with the key
          `APP_ENV=production`. Save the value to `/root/configmap_value.txt`.
        answer: docs/verify/task-004.sh
        points: 20

helm_packages:
